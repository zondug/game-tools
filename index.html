<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게임 요소 그물 네트워크</title>
  <meta name="description" content="Game Designer's Mechanic Mesh — 장르↔요소 양방향 탐색으로 게임에 필요한 UI 요소를 화면별로 도출하는 기획 도구" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #0F1418; font-family: 'Apple SD Gothic Neo', system-ui, -apple-system, sans-serif; }
    button, input, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #2A353D; border-radius: 4px; }
    .report-only { display: none; }
    @media print {
      .no-print { display: none !important; }
      .report-only { display: block !important; }
      body { background: #fff; }
    }
    @media (max-width: 760px) {
      .main-cols { flex-direction: column; }
      .genre-list { max-height: 110px; overflow-y: auto; }
      .sticky-bar { position: static !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./dist/app.js"></script>
</body>
</html>
