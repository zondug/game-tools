    function genreTemplate(g) {
      const best = {};
      Object.entries(g.prof).forEach(([k, w]) => { const ax = AXIS_OF[k]; if (!best[ax] || w > best[ax].w) best[ax] = { el: k.split(".")[1], w }; });
      const sel = {};
      Object.entries(best).forEach(([ax, o]) => (sel[ax] = [o.el]));
      return sel;
    }
    // sel = {축: [요소...]} (단일 축은 길이 1, 다중 축은 여러 개)
    function axisSig(sel) {
      return Object.keys(sel).filter((a) => sel[a] && sel[a].length).sort()
        .map((a) => `${a}.${[...sel[a]].sort().join("+")}`).join("|");
    }
    function fullSig(sel, featArr) { return axisSig(sel) + "#" + [...featArr].sort().join(","); }

    GENRES.forEach((g) => {
      const m = {};
      Object.entries(g.prof).forEach(([k, w]) => { const ax = AXIS_OF[k]; m[ax] = Math.max(m[ax] || 0, w); });
      g._axisMax = m;
      g._sig = fullSig(genreTemplate(g), g.feats || []);
    });

    function scoreGenres(selKeys) {
      const raws = GENRES.map((g) => {
        let raw = 0;
        selKeys.forEach((k) => {
          if (g.prof[k] != null) raw += g.prof[k];
          else { const ax = AXIS_OF[k]; if (g._axisMax[ax]) raw -= 0.55 * g._axisMax[ax]; }
        });
        return { g, raw };
      });
      const pos = raws.filter((r) => r.raw > 0.01);
      if (!pos.length) return [];
      const mx = Math.max(...pos.map((r) => r.raw));
      const exps = pos.map((r) => ({ g: r.g, e: Math.exp((r.raw - mx) * 1.7) }));
      const sum = exps.reduce((a, b) => a + b.e, 0);
      return exps.map((x) => ({ g: x.g, p: x.e / sum })).sort((a, b) => b.p - a.p);
    }

    function deriveUI(axisKeys, featSet) {
      const map = {};
      const add = (item, src) => {
        const key = item[0][1]; // 영문명으로 dedup
        if (!map[key]) map[key] = { n: item[0], d: item[1], src: [] };
        if (src && !map[key].src.some((s) => s[1] === src[1])) map[key].src.push(src);
      };
      axisKeys.forEach((k) => (UI_MAP[k] || []).forEach((it) => add(it, LABEL[k])));
      FEATURES.forEach((f) => { if (featSet.has(f.id)) f.ui.forEach((it) => add(it, f.name)); });
      return Object.values(map).sort((a, b) => b.src.length - a.src.length);
    }

        ["anime", "애니메", "Anime", 25978], ["stylized", "스타일라이즈드", "Stylized", 25901], ["retro", "레트로", "Retro", 21173],
        ["realistic", "사실적", "Realistic", 20378], ["cartoony", "카투니", "Cartoony", 17716], ["handdrawn", "핸드드로잉", "Hand-drawn", 14445],
        ["minimalist", "미니멀", "Minimalist", 13673], ["cinematic", "시네마틱", "Cinematic", 7395], ["abstract", "추상적", "Abstract", 5290],
        ["voxel", "복셀", "Voxel", 1582], ["textbased", "텍스트 기반", "Text-Based", 7688],
      ]},
      { name: ["소재·활동", "Subject/Activity"], tags: [
        ["driving", "드라이빙", "Driving", 5048], ["flight", "비행", "Flight", 3582], ["cooking", "요리", "Cooking", 2820],
        ["mining", "채굴", "Mining", 1858], ["fishing", "낚시", "Fishing", 1665], ["gambling", "도박", "Gambling", 1515],
        ["trains", "기차", "Trains", 1377], ["hunting", "사냥", "Hunting", 1183], ["hacking", "해킹", "Hacking", 1181],
        ["programming", "프로그래밍", "Programming", 1052], ["sailing", "항해", "Sailing", 815], ["farming", "농사", "Farming", 576],
      ]},
      { name: ["수위·자극", "Mature"], tags: [
        ["sexual", "성적 콘텐츠", "Sexual Content", 19040], ["nudity", "노출", "Nudity", 17677], ["violent", "폭력적", "Violent", 16150],
        ["adult", "성인 콘텐츠", "Adult Content", 14034], ["gore", "고어", "Gore", 13491], ["hentai", "헨타이", "Hentai", 7996],
      ]},
    ];
    const TAG_BY = {};
    TAG_GROUPS.forEach((grp) => grp.tags.forEach(([id, ko, en, n]) => (TAG_BY[id] = { id, name: [ko, en], n })));

    /* ================= 앱 ================= */
    function App() {
      const [locale, setLocale] = useState("ko");
      IDX = locale === "ko" ? 0 : 1;
      const ko = locale === "ko";

      const [sel, setSel] = useState({});          // {axisId: [elId,...]}
      const [feats, setFeats] = useState(new Set()); // 기능 태그 id
      const [tags, setTags] = useState(new Set());   // 테마 태그 id

      const selKeys = useMemo(() => new Set(Object.entries(sel).flatMap(([a, arr]) => (arr || []).map((e) => `${a}.${e}`))), [sel]);
      const uiList = useMemo(() => deriveUI(selKeys, feats), [selKeys, feats]);
      const chosenCount = selKeys.size + feats.size;

      const sig = useMemo(() => fullSig(sel, feats), [sel, feats]);
      const exactGenre = useMemo(() => {
        const g = GENRES.find((g) => g._sig === sig && selKeys.size);
        return g || null;
      }, [sig, selKeys]);
      const derived = useMemo(() => scoreGenres(selKeys).filter((x) => x.p > 0.02).slice(0, 4), [selKeys]);

      const MULTI = { verb: 1, goal: 1, growth: 1, social: 1, econ: 1 };
      const pickGenre = (g) => { setSel(genreTemplate(g)); setFeats(new Set(g.feats || [])); };
      const toggle = (axisId, elId) => setSel((p) => {
        const cur = p[axisId] ? [...p[axisId]] : [];
        const i = cur.indexOf(elId);
        let next;
        if (MULTI[axisId]) { if (i >= 0) cur.splice(i, 1); else cur.push(elId); next = cur; }
        else next = (i >= 0 && cur.length === 1) ? [] : [elId];
        const n = { ...p };
        if (next.length) n[axisId] = next; else delete n[axisId];
        return n;
      });
      const toggleSet = (setter) => (id) => setter((p) => { const n = new Set(p); if (n.has(id)) n.delete(id); else n.add(id); return n; });
      const toggleFeat = toggleSet(setFeats);
      const toggleTag = toggleSet(setTags);
      const reset = () => { setSel({}); setFeats(new Set()); setTags(new Set()); };

      const axisChipStyle = (isSel, filled) => {
        let border = C.border, bg = C.surface2, color = C.text, weight = 400;
        if (filled && !isSel) { color = C.faint; bg = "transparent"; }
        if (isSel) { border = C.blue; bg = C.blueTint; color = "#CFE0EE"; weight = 700; }
        return { border: `1px solid ${border}`, background: bg, color, fontWeight: weight, borderRadius: 6, padding: "7px 11px", fontSize: 13.5, lineHeight: 1.2, cursor: "pointer", transition: "all .12s", userSelect: "none", WebkitTapHighlightColor: "transparent" };
      };
      const multiChipStyle = (on, col, tint) => ({
        border: `1px solid ${on ? col : C.border}`, background: on ? tint : C.surface2, color: on ? "#EAF1EE" : C.text,
        fontWeight: on ? 700 : 400, borderRadius: 6, padding: "7px 11px", fontSize: 13, lineHeight: 1.2, cursor: "pointer", transition: "all .12s", userSelect: "none",
      });

      const genreName = (g) => T(g.name);

      // 선택 요약 칩(축+기능=파랑, 태그=초록)
      const summaryChips = [
        ...Object.entries(sel).flatMap(([a, arr]) => (arr || []).map((e) => ({ kind: "axis", key: `${a}.${e}`, label: LABEL[`${a}.${e}`], on: () => toggle(a, e) }))),
        ...[...feats].map((id) => ({ kind: "feat", key: "f:" + id, label: FEAT_BY[id].name, on: () => toggleFeat(id) })),
        ...[...tags].map((id) => ({ kind: "tag", key: "t:" + id, label: TAG_BY[id].name, on: () => toggleTag(id) })),
      ];

      // ── 내보내기 ──
      const axesSel = AXES.map((ax) => ({ name: T(ax.name), els: (sel[ax.id] || []).map((id) => T(LABEL[`${ax.id}.${id}`])) })).filter((a) => a.els.length);
      const featSel = FEATURES.filter((f) => feats.has(f.id)).map((f) => T(f.name));
      const tagSel = [...tags].map((id) => T(TAG_BY[id].name));
      const buildMd = () => {
        const L = [];
        L.push("# " + (ko ? "게임 UI 스펙 시트" : "Game UI Spec Sheet"), "");
        L.push("- " + (ko ? "장르" : "Genre") + ": " + (exactGenre ? T(exactGenre.name) : (ko ? "커스텀 조합" : "Custom")));
        if (derived.length) L.push("- " + (ko ? "가까운 장르" : "Closest") + ": " + derived.map((d) => T(d.g.name) + " " + Math.round(d.p * 100) + "%").join(", "));
        L.push("", "## " + (ko ? "선택 요소" : "Elements"));
        axesSel.forEach((a) => L.push("- **" + a.name + "**: " + a.els.join(", ")));
        if (featSel.length) { L.push("", "## " + (ko ? "기능" : "Features")); featSel.forEach((f) => L.push("- " + f)); }
        if (tagSel.length) { L.push("", "## " + (ko ? "테마 태그" : "Theme Tags"), tagSel.join(", ")); }
        L.push("", "## " + (ko ? "필요 UI 요소" : "Required UI"), "", "### " + (ko ? "공통" : "Common"));
        BASE_UI.forEach((u) => L.push("- " + T(u[0]) + " — " + T(u[1])));
        L.push("", "### " + (ko ? "조합 유래" : "From this build"));
        uiList.forEach((u) => L.push("- " + T(u.n) + " — " + T(u.d) + (u.src.length ? " (" + (ko ? "유래" : "from") + ": " + u.src.map((s) => T(s)).join(", ") + ")" : "")));
        return L.join("\n");
      };
      const copyMd = () => navigator.clipboard.writeText(buildMd());
      const dlMd = () => { const b = new Blob([buildMd()], { type: "text/markdown" }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "game-ui-spec.md"; a.click(); URL.revokeObjectURL(a.href); };
      const exportBtn = { cursor: "pointer", flex: 1, minWidth: 90, background: C.surface2, border: `1px solid ${C.border}`, color: C.text, borderRadius: 7, padding: "8px", fontSize: 12.5 };

      return (
        <div style={{ minHeight: "100vh", background: C.bg, color: C.text }}>
          <div className="no-print" style={{ maxWidth: 1120, margin: "0 auto", padding: "22px 20px 60px" }}>
            {/* 헤더 */}
            <header style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ font: "600 11px ui-monospace,Menlo,monospace", color: C.accent, letterSpacing: 2, marginBottom: 6 }}>GENRE ↔ ELEMENTS → UI</div>
                <div style={{ display: "flex", border: `1px solid ${C.border}`, borderRadius: 7, overflow: "hidden" }}>
                  {[["ko", "한국어"], ["en", "EN"]].map(([lc, lbl]) => (
                    <button key={lc} onClick={() => setLocale(lc)}
                      style={{ cursor: "pointer", border: "none", padding: "5px 11px", fontSize: 12, fontWeight: 700,
                        background: locale === lc ? C.accent : "transparent", color: locale === lc ? "#1A130A" : C.muted }}>{lbl}</button>
                  ))}
                </div>
              </div>
              <h1 style={{ margin: "0 0 6px", fontSize: 22, fontWeight: 700, letterSpacing: -0.3 }}>{ko ? "게임 UI 템플릿 도출기" : "Game UI Template Deriver"}</h1>
              <p style={{ margin: 0, fontSize: 13, color: C.muted, lineHeight: 1.6 }}>
                {ko
                  ? <>장르를 고르면 표준 요소가 채워지고, 요소를 손보면 그 조합의 <b style={{ color: C.text }}>필요 UI 요소</b>가 나온다. 요소로 시작하면 <b style={{ color: C.text }}>가까운 장르</b>가 역산된다. 파란 = 선택.</>
                  : <>Pick a genre to load its template, tweak elements to get the <b style={{ color: C.text }}>required UI</b>, or start from elements and the <b style={{ color: C.text }}>closest genre</b> is inferred. Blue = selected.</>}
              </p>
            </header>

            {/* 상단 고정: 장르 + 선택 요약 */}
            <div style={{ position: "sticky", top: 0, zIndex: 20, background: C.bg, paddingTop: 8, paddingBottom: 12, marginBottom: 16, borderBottom: `1px solid ${C.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                <span style={{ fontSize: 12.5, fontWeight: 600, color: C.accent }}>{ko ? "장르 ↔ 요소 (양방향)" : "Genre ↔ Elements"}</span>
                {chosenCount > 0 && (
                  <span style={{ font: "11px ui-monospace,monospace", color: C.muted }}>
                    {exactGenre ? <>{ko ? "현재" : "now"}: <b style={{ color: "#F2DDAE" }}>{genreName(exactGenre)}</b></> : <span style={{ color: C.faint }}>{ko ? "커스텀 조합" : "custom"}</span>}
                  </span>
                )}
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {GENRES.map((g) => {
                  const on = exactGenre && g._sig === exactGenre._sig;
                  return (
                    <button key={T(g.name)} onClick={() => pickGenre(g)}
                      style={{ cursor: "pointer", borderRadius: 7, padding: "6px 11px", fontSize: 13,
                        border: `1px solid ${on ? C.accent : C.border}`, background: on ? "rgba(224,163,62,0.16)" : C.surface2,
                        color: on ? "#F2DDAE" : C.text, fontWeight: on ? 700 : 500 }}>{genreName(g)}</button>
                  );
                })}
              </div>

              {/* 선택 요약 */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, minHeight: 32 }}>
                <span style={{ fontSize: 11.5, color: C.faint, flexShrink: 0 }}>{ko ? "선택" : "sel"} {summaryChips.length}</span>
                <div style={{ display: "flex", gap: 6, overflowX: "auto", flex: 1 }}>
                  {summaryChips.length === 0 ? (
                    <span style={{ fontSize: 12.5, color: C.faint }}>{ko ? "장르를 고르거나 아래에서 직접 골라라." : "Pick a genre or choose below."}</span>
                  ) : summaryChips.map((c) => {
                    const teal = c.kind === "tag";
                    return (
                      <button key={c.key} onClick={c.on}
                        style={{ flexShrink: 0, display: "flex", alignItems: "center", gap: 5, cursor: "pointer",
                          border: `1px solid ${teal ? C.teal : C.blue}`, background: teal ? C.tealTint : C.blueTint, color: teal ? "#CDE8D9" : "#CFE0EE",
                          borderRadius: 6, padding: "4px 8px", fontSize: 12.5, lineHeight: 1.2 }}>
                        {T(c.label)}<span style={{ color: C.muted, fontWeight: 700 }}>×</span>
                      </button>
                    );
                  })}
                </div>
                {chosenCount + tags.size > 0 && <button onClick={reset} style={{ flexShrink: 0, background: "transparent", border: "none", color: C.faint, fontSize: 11.5, cursor: "pointer" }}>{ko ? "초기화" : "reset"}</button>}
              </div>

              {derived.length > 0 && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8, minHeight: 26 }}>
                  <span style={{ fontSize: 11.5, color: C.faint, flexShrink: 0 }}>{ko ? "가까운 장르" : "closest"}</span>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {derived.map((d) => {
                      const on = exactGenre && d.g._sig === exactGenre._sig;
                      return (
                        <button key={T(d.g.name)} onClick={() => pickGenre(d.g)}
                          style={{ cursor: "pointer", borderRadius: 6, padding: "3px 9px", fontSize: 12,
                            border: `1px solid ${on ? C.accent : C.border}`, background: on ? "rgba(224,163,62,0.16)" : C.surface2, color: on ? "#F2DDAE" : C.text }}>
                          {genreName(d.g)} <span style={{ color: C.muted, font: "10px ui-monospace,monospace" }}>{Math.round(d.p * 100)}%</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>

            <div style={{ display: "flex", gap: 24, flexWrap: "wrap", alignItems: "flex-start" }}>
              {/* 왼쪽 */}
              <div style={{ flex: "1 1 480px", minWidth: 320 }}>
                {/* 축 */}
                <div style={{ fontSize: 12.5, fontWeight: 600, color: C.accent, marginBottom: 12 }}>{ko ? "축 · 요소 조정" : "Axes"} <span style={{ color: C.faint, fontWeight: 400 }}>{ko ? "(택1 = 배타 · 다중 = 동시 선택)" : "(one = exclusive · multi = stackable)"}</span></div>
                {AXES.map((ax) => {
                  const arr = sel[ax.id] || [];
                  const filled = arr.length > 0;
                  return (
                    <div key={ax.id} style={{ marginBottom: 14 }}>
                      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 7 }}>
                        <span style={{ fontSize: 14, fontWeight: 600, color: filled ? C.blue : C.text }}>{T(ax.name)}</span>
                        {ax.multi
                          ? <span style={{ fontSize: 10.5, color: C.teal, border: `1px solid ${C.teal}`, borderRadius: 4, padding: "0 5px" }}>{ko ? "다중" : "multi"}</span>
                          : <span style={{ fontSize: 10.5, color: C.faint, border: `1px solid ${C.border}`, borderRadius: 4, padding: "0 5px" }}>{ko ? "택1" : "one"}</span>}
                        {T(ax.hint) && <span style={{ fontSize: 11.5, color: C.faint }}>{T(ax.hint)}</span>}
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                        {ax.els.map(([id, lbl]) => (
                          <button key={id} onClick={() => toggle(ax.id, id)} style={axisChipStyle(arr.includes(id), filled && !ax.multi)}>{T(lbl)}</button>
                        ))}
                      </div>
                    </div>
                  );
                })}

                {/* 기능 태그 (다중) */}
                <div style={{ fontSize: 12.5, fontWeight: 600, color: C.accent, margin: "22px 0 10px" }}>{ko ? "기능 태그" : "Feature Tags"} <span style={{ color: C.faint, fontWeight: 400 }}>{ko ? "(다중 선택 · UI를 만든다)" : "(multi · drives UI)"}</span></div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                  {FEATURES.map((f) => (
                    <button key={f.id} onClick={() => toggleFeat(f.id)} style={multiChipStyle(feats.has(f.id), C.blue, C.blueTint)}>{T(f.name)}</button>
                  ))}
                </div>

                {/* 테마 태그 (다중, 코스메틱) */}
                <div style={{ fontSize: 12.5, fontWeight: 600, color: C.teal, margin: "22px 0 4px" }}>{ko ? "스팀 테마 태그" : "Steam Theme Tags"} <span style={{ color: C.faint, fontWeight: 400 }}>{ko ? "(직교 · UI 무관 · 숫자=스팀 태그 수)" : "(orthogonal · no UI · # = Steam count)"}</span></div>
                {TAG_GROUPS.map((grp) => (
                  <div key={T(grp.name)} style={{ marginTop: 12 }}>
                    <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 6 }}>{T(grp.name)}</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {grp.tags.map(([id, kolbl, enlbl, n]) => {
                        const on = tags.has(id);
                        return (
                          <button key={id} onClick={() => toggleTag(id)} style={{ ...multiChipStyle(on, C.teal, C.tealTint), fontSize: 12, padding: "5px 9px", display: "flex", alignItems: "center", gap: 5 }}>
                            {ko ? kolbl : enlbl}<span style={{ font: "9.5px ui-monospace,monospace", color: on ? "#9BC9AE" : C.faint }}>{n >= 1000 ? (n / 1000).toFixed(0) + "k" : n}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

              {/* 오른쪽: 필요 UI */}
              <div style={{ flex: "1 1 320px", minWidth: 300, position: "sticky", top: 190 }}>
                <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                    <span style={{ fontSize: 14, fontWeight: 700, color: "#F2DDAE" }}>{ko ? "필요 UI 요소" : "Required UI"}</span>
                    <span style={{ font: "11px ui-monospace,monospace", color: C.faint }}>{BASE_UI.length + uiList.length}</span>
                  </div>
                  <div style={{ fontSize: 11.5, color: C.faint, marginBottom: 14, lineHeight: 1.5 }}>{ko ? "이 조합을 구현하려면 필요한 화면·위젯" : "screens & widgets this build needs"}</div>

                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, marginBottom: 8, letterSpacing: 0.5 }}>{ko ? "공통" : "Common"}</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {BASE_UI.map((u) => (
                        <div key={u[0][1]} style={{ borderLeft: `2px solid ${C.faint}`, paddingLeft: 10 }}>
                          <div style={{ fontSize: 13, color: C.text }}>{T(u[0])}</div>
                          <div style={{ fontSize: 11, color: C.faint }}>{T(u[1])}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, marginBottom: 8, letterSpacing: 0.5 }}>{ko ? "이 조합이 요구하는 것" : "From this build"}</div>
                    {uiList.length === 0 ? (
                      <div style={{ fontSize: 12.5, color: C.faint, lineHeight: 1.6 }}>{ko ? "장르나 요소를 고르면 채워진다." : "Pick a genre or elements."}</div>
                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                        {uiList.map((u) => (
                          <div key={u.n[1]} style={{ borderLeft: `2px solid ${C.blue}`, paddingLeft: 10 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                              <span style={{ fontSize: 13.5, color: C.text, fontWeight: 600 }}>{T(u.n)}</span>
                              {u.src.length > 1 && <span style={{ font: "10px ui-monospace,monospace", color: C.blue, flexShrink: 0 }}>×{u.src.length}</span>}
                            </div>
                            <div style={{ fontSize: 11, color: C.faint, marginBottom: 3 }}>{T(u.d)}</div>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                              {u.src.map((s) => <span key={s[1]} style={{ fontSize: 10, color: C.muted, background: C.surface2, borderRadius: 3, padding: "1px 5px" }}>{T(s)}</span>)}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {tags.size > 0 && (
                    <div style={{ marginTop: 16, paddingTop: 14, borderTop: `1px solid ${C.border}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: C.teal, marginBottom: 8, letterSpacing: 0.5 }}>{ko ? "테마·태그 (UI 무관)" : "Themes (no UI)"}</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                        {[...tags].map((id) => <span key={id} style={{ fontSize: 12, color: "#CDE8D9", background: C.tealTint, border: `1px solid ${C.teal}`, borderRadius: 5, padding: "2px 7px" }}>{T(TAG_BY[id].name)}</span>)}
                      </div>
                    </div>
                  )}
                </div>

                {/* 내보내기 */}
                <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                  <button onClick={copyMd} style={exportBtn}>{ko ? "MD 복사" : "Copy MD"}</button>
                  <button onClick={dlMd} style={exportBtn}>{ko ? ".md 저장" : "Save .md"}</button>
                  <button onClick={() => window.print()} style={{ ...exportBtn, borderColor: C.accent, color: "#F2DDAE" }}>{ko ? "PDF 인쇄" : "Print PDF"}</button>
                </div>
                <div style={{ fontSize: 10.5, color: C.faint, marginTop: 6, lineHeight: 1.5 }}>{ko ? "PDF 인쇄 → 대상을 'PDF로 저장' 선택" : "Print → choose 'Save as PDF'"}</div>
              </div>
            </div>
          </div>

          {/* 인쇄 전용 리포트 (화면 숨김, PDF에만) */}
          <div className="report-only" style={{ padding: "28px 32px", color: "#111", background: "#fff", fontFamily: "system-ui,sans-serif", lineHeight: 1.5 }}>
            <h1 style={{ fontSize: 20, margin: "0 0 4px" }}>{ko ? "게임 UI 스펙 시트" : "Game UI Spec Sheet"}</h1>
            <p style={{ fontSize: 13, margin: "0 0 16px" }}>
              <b>{ko ? "장르" : "Genre"}:</b> {exactGenre ? T(exactGenre.name) : (ko ? "커스텀 조합" : "Custom")}
              {derived.length ? <span style={{ color: "#555" }}> · {ko ? "가까운" : "closest"}: {derived.map((d) => T(d.g.name) + " " + Math.round(d.p * 100) + "%").join(", ")}</span> : null}
            </p>
            <h2 style={{ fontSize: 15, borderBottom: "1px solid #ccc", paddingBottom: 3 }}>{ko ? "선택 요소" : "Elements"}</h2>
            <ul style={{ fontSize: 13, marginTop: 6 }}>{axesSel.map((a) => <li key={a.name}><b>{a.name}</b>: {a.els.join(", ")}</li>)}</ul>
            {featSel.length ? <><h2 style={{ fontSize: 15, borderBottom: "1px solid #ccc", paddingBottom: 3 }}>{ko ? "기능" : "Features"}</h2><p style={{ fontSize: 13 }}>{featSel.join(", ")}</p></> : null}
            {tagSel.length ? <><h2 style={{ fontSize: 15, borderBottom: "1px solid #ccc", paddingBottom: 3 }}>{ko ? "테마 태그" : "Theme Tags"}</h2><p style={{ fontSize: 13 }}>{tagSel.join(", ")}</p></> : null}
            <h2 style={{ fontSize: 15, borderBottom: "1px solid #ccc", paddingBottom: 3 }}>{ko ? "필요 UI 요소" : "Required UI"} ({BASE_UI.length + uiList.length})</h2>
            <p style={{ fontSize: 12, fontWeight: 700, margin: "8px 0 2px" }}>{ko ? "공통" : "Common"}</p>
            <ul style={{ fontSize: 13, margin: 0 }}>{BASE_UI.map((u) => <li key={u[0][1]}>{T(u[0])} — <span style={{ color: "#555" }}>{T(u[1])}</span></li>)}</ul>
            <p style={{ fontSize: 12, fontWeight: 700, margin: "10px 0 2px" }}>{ko ? "조합 유래" : "From this build"}</p>
            <ul style={{ fontSize: 13, margin: 0 }}>{uiList.map((u) => <li key={u.n[1]}>{T(u.n)} — <span style={{ color: "#555" }}>{T(u.d)}{u.src.length ? " (" + u.src.map((s) => T(s)).join(", ") + ")" : ""}</span></li>)}</ul>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
